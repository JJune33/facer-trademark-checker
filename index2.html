<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facer Trademark Checker</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #161922;
      color: #eee;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 0, #2d3446 0, #161922 38%, #101219 100%);
      z-index: -1;
    }

    header {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: #202532;
      border-bottom: 1px solid #343b4d;
      box-shadow: 0 8px 24px #0008;
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 800;
      color: #9fd7ff;
      letter-spacing: .4px;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 22px 16px 40px;
    }

    p {
      color: #aeb6c7;
    }

    textarea {
      width: 100%;
      height: 180px;
      resize: vertical;
      border: 1px solid #343b4d;
      border-radius: 18px;
      padding: 18px;
      background: #11141c;
      color: #fff8d6;
      font: 16px/1.55 ui-monospace, SFMono-Regular, Consolas, monospace;
      outline: 0;
      box-shadow:
        inset 8px 8px 18px #0008,
        inset -6px -6px 14px #ffffff08,
        0 12px 28px #0008;
    }

    textarea:focus {
      border-color: #6ebfff;
      box-shadow:
        inset 8px 8px 18px #0008,
        inset -6px -6px 14px #ffffff08,
        0 0 0 3px #6ebfff22,
        0 12px 28px #0008;
    }

    button {
      background: #2b3140;
      border: 1px solid #3d4558;
      color: #f4f0dd;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      box-shadow:
        0 4px 10px #0006,
        inset 0 1px 0 #ffffff12;
    }

    button:hover {
      background: #343b4d;
      color: #9fd7ff;
      box-shadow:
        0 6px 16px #0008,
        0 0 12px #70c7ff22;
    }

    button:active {
      transform: translateY(1px);
    }

    .icon-button {
      font-size: 1.3rem;
      padding: 8px 12px;
    }

    .result {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 16px;
      border: 1px solid #343b4d;
      background: #202532;
      box-shadow: 0 8px 20px #0006;
    }

    .ok {
      background: #123326;
      color: #8fffc1;
      border-color: #2c7a55;
    }

    .warn {
      background: #3a2d13;
      color: #ffd98a;
      border-color: #856404;
    }

    #wordListContainer {
      margin-top: 2rem;
      display: none;
    }

    h3 {
      color: #9fd7ff;
    }

    #wordList {
      max-height: 300px;
      overflow-y: auto;
      padding: 1rem;
      background: #11141c;
      border: 1px solid #343b4d;
      border-radius: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      box-shadow:
        inset 8px 8px 18px #0008,
        inset -6px -6px 14px #ffffff08;
    }

    .badge {
      background: #2b3140;
      border: 1px solid #3d4558;
      color: #dce8f8;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>✦ Facer Trademark Checker</h1>
    <button class="icon-button" onclick="toggleList()" title="Show trademark word list">📄</button>
  </header>

  <main>
    <p>Paste your description below:</p>
    <textarea id="inputText" placeholder="e.g. Inspired by Rolex, Seiko, and others..."></textarea>
    <button onclick="checkTrademarks()">Check for trademarks</button>

    <div id="result" class="result"></div>

    <div id="wordListContainer">
      <h3>Trademark word list</h3>
      <div id="wordList"></div>
    </div>
  </main>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQdhyTC2yiHRDg9NEhk22h0CG82nRO8osF6JsR1KSVWzlLGNHLKBJOw1jIEmu5IkabEV1O8IobLL5ey/pub?output=csv";
    let cachedWords = [];

    async function fetchWords() {
      const response = await fetch(CSV_URL);
      const csv = await response.text();
      cachedWords = csv.split(/\r?\n/).map(t => t.trim().toLowerCase()).filter(t => t);
      cachedWords.sort();
    }

    async function checkTrademarks() {
      const input = document.getElementById("inputText").value.toLowerCase();
      const resultBox = document.getElementById("result");
      resultBox.innerHTML = "Checking...";
      resultBox.className = "result";

      try {
        if (cachedWords.length === 0) await fetchWords();
        const words = input.split(/[^a-zA-Z0-9\-]+/);
        const matched = cachedWords.filter(t => words.includes(t));

        if (matched.length > 0) {
          resultBox.classList.add("warn");
          resultBox.innerHTML = `⚠️ <strong>Warning:</strong> Potential trademarked terms found:<br><em>${matched.join(", ")}</em>`;
        } else {
          resultBox.classList.add("ok");
          resultBox.innerHTML = "✅ No known trademark issues found.";
        }
      } catch (err) {
        resultBox.innerHTML = "❌ Error loading trademark list.";
        console.error(err);
      }
    }

    async function toggleList() {
      const container = document.getElementById("wordListContainer");
      const list = document.getElementById("wordList");

      if (container.style.display === "none") {
        if (cachedWords.length === 0) await fetchWords();
        list.innerHTML = "";

        cachedWords.forEach(word => {
          const span = document.createElement("span");
          span.className = "badge";
          span.textContent = word;
          list.appendChild(span);
        });

        container.style.display = "block";
      } else {
        container.style.display = "none";
      }
    }
  </script>
</body>
</html>
